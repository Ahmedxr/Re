<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>شات عائلي ذكي</title>

<style>
body{
  font-family: Arial;
  background:#f2f2f2;
  margin:0;
  display:flex;
  flex-direction:column;
  height:100vh;
}

header{
  background:#2b6cb0;
  color:white;
  padding:15px;
  text-align:center;
  font-size:20px;
}

#chat{
  flex:1;
  overflow-y:auto;
  padding:10px;
}

.msg{
  margin:8px;
  padding:10px;
  border-radius:10px;
  max-width:70%;
}

.me{
  background:#c6f6d5;
  margin-left:auto;
}

.bot{
  background:#e2e8f0;
}

footer{
  display:flex;
  padding:10px;
  background:white;
}

input{
  flex:1;
  padding:10px;
  border:1px solid #ccc;
}

button{
  padding:10px;
  background:#2b6cb0;
  color:white;
  border:none;
}
</style>

</head>
<body>

<header>🤖 شات عائلي ذكي</header>

<div id="chat"></div>

<footer>
<input id="msg" placeholder="اكتب رسالتك...">
<button onclick="send()">إرسال</button>
</footer>

<script>
async function send(){
  let msg = document.getElementById("msg").value;
  if(!msg) return;

  let chat = document.getElementById("chat");

  // رسالة المستخدم
  chat.innerHTML += `<div class="msg me">${msg}</div>`;

  document.getElementById("msg").value = "";

  // إرسال للسيرفر
  let res = await fetch("/chat", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({message: msg})
  });

  let data = await res.json();

  // رد الذكاء الاصطناعي
  chat.innerHTML += `<div class="msg bot">${data.reply}</div>`;

  chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
